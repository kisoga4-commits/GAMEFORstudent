<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Kids - เข้าเล่น</title>
    <meta name="theme-color" content="#6d28d9" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="../src/css/styles.css" />
  </head>
  <body>
    <main class="page page-login">
      <section class="game-card">
        <p class="badge">🎮 Kid Maze Adventure</p>
        <h1>เข้าเล่นเกม</h1>
        <p class="subtitle">กรอกข้อมูล 2 ช่อง แล้วเริ่มผจญภัยได้ทันที</p>

        <form id="loginForm" class="form" autocomplete="off">
          <label for="playerName">ชื่อตัวละคร</label>
          <input
            id="playerName"
            name="playerName"
            type="text"
            maxlength="20"
            placeholder="เช่น นักสำรวจดาว"
            required
          />

          <label for="playerCode">รหัส</label>
          <input
            id="playerCode"
            name="playerCode"
            type="password"
            placeholder="กรอกรหัส"
            required
          />

          <button id="submitBtn" type="submit">เข้าเล่น</button>
        </form>

        <p id="statusMessage" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="../src/js/main.js"></script>
  </body>
</html>
