<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Kids - Lobby</title>
    <link rel="stylesheet" href="../src/css/styles.css" />
  </head>
  <body class="page-lobby">
    <main class="container">
      <section class="card card-lobby" aria-label="หน้าล็อบบี้">
        <p class="badge">🏰 Lobby</p>
        <h1 class="game-title">พร้อมผจญภัย!</h1>

        <article class="player-panel">
          <p class="stat-label">ผู้เล่น</p>
          <p id="playerNameDisplay" class="player-name">-</p>
        </article>

        <div class="stats-grid" aria-label="ข้อมูลผู้เล่น">
          <article class="stat-item">
            <p class="stat-label">coins</p>
            <p id="coinsDisplay" class="stat-value">0</p>
          </article>
          <article class="stat-item">
            <p class="stat-label">rank</p>
            <p id="rankDisplay" class="stat-value">Rookie</p>
          </article>
        </div>

        <p id="statusMessage" class="status" role="status" aria-live="polite"></p>

        <div class="action-row single-col">
          <a id="startGameBtn" class="link-btn" href="./game.html">เริ่มเล่น</a>
          <button id="waitDuelBtn" type="button" class="btn-secondary">รอดวล</button>
          <button id="logoutBtn" type="button" class="btn-danger">ออกจากระบบ</button>
        </div>
      </section>
    </main>

    <script type="module" src="../src/js/lobby.js"></script>
  </body>
</html>
