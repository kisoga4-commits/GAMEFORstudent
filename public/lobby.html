<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Kids - Lobby</title>
    <link rel="stylesheet" href="../src/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="game-card">
        <p class="badge">🏠 Lobby</p>
        <h1>ยินดีต้อนรับ!</h1>
        <p id="lobbyStatus" class="status" aria-live="polite"></p>

        <div class="profile-box">
          <p><strong>ชื่อตัวละคร:</strong> <span id="profileName">-</span></p>
          <p><strong>รหัส:</strong> <span id="profileCode">-</span></p>
          <p><strong>เหรียญ:</strong> <span id="profileCoins">0</span></p>
          <p><strong>แรงก์:</strong> <span id="profileRank">1</span></p>
          <p><strong>ด่านปัจจุบัน:</strong> <span id="profileLevel">1</span></p>
        </div>

        <a class="link-btn" href="./index.html">ออกจาก Lobby</a>
      </section>
    </main>

    <script type="module" src="../src/js/lobby.js"></script>
  </body>
</html>
