<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Kids - Lobby</title>
    <link rel="stylesheet" href="../src/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card card-lobby">
        <p class="badge">🕹️ พร้อมดวล</p>
        <h1>Lobby</h1>
        <p class="subtitle">เข้าคิวรอดวลแบบ realtime จาก Firebase Realtime Database</p>

        <div class="stats-grid" aria-label="สถิติผู้เล่น">
          <article class="stat-item">
            <p class="stat-label">ออนไลน์ทั้งหมด</p>
            <p id="onlineCount" class="stat-value">0</p>
          </article>
          <article class="stat-item">
            <p class="stat-label">อยู่ใน Lobby</p>
            <p id="lobbyCount" class="stat-value">0</p>
          </article>
          <article class="stat-item">
            <p class="stat-label">กำลังรอดวล</p>
            <p id="queueCount" class="stat-value">0</p>
          </article>
        </div>

        <section class="queue-panel" aria-label="คิวรอดวล">
          <h2>คิวรอดวล</h2>
          <p id="queueStateText" class="queue-state">ยังไม่เข้าคิว</p>

          <div class="action-row">
            <button id="waitDuelBtn" type="button">รอดวล</button>
            <button id="cancelQueueBtn" type="button" class="btn-secondary" hidden>ยกเลิกรอดวล</button>
          </div>

          <ul id="queueList" class="queue-list" aria-live="polite">
            <li class="queue-item queue-item-empty">ยังไม่มีผู้เล่นในคิว</li>
          </ul>
        </section>

        <p id="statusMessage" class="status" role="status" aria-live="polite"></p>
        <a class="link-btn link-btn-secondary" href="./index.html">กลับหน้าเข้าเกม</a>
      </section>
    </main>

    <script type="module" src="../src/js/lobby.js"></script>
  </body>
</html>
