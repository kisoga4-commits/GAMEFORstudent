<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForKid World Map</title>
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body class="world-page">
    <main class="world-shell" aria-label="แผนที่โลกหลักของเกม">
      <header class="world-header">
        <p class="chip">🌟 World Map</p>
        <h1 id="playerGreeting">สวัสดี นักผจญภัย</h1>
        <p id="worldStatus" class="world-status" aria-live="polite">กำลังเข้าสู่โลกเกม...</p>
      </header>

      <section class="map-frame" aria-label="แผนที่ด่าน">
        <div id="worldMap" class="world-map" role="application" aria-label="แผนที่เกม"></div>
      </section>

      <section class="controls" aria-label="ปุ่มบังคับเดิน">
        <button type="button" class="move-btn" data-dir="up" aria-label="เดินขึ้น">▲</button>
        <div class="controls-row">
          <button type="button" class="move-btn" data-dir="left" aria-label="เดินซ้าย">◀</button>
          <button type="button" class="move-btn" data-dir="down" aria-label="เดินลง">▼</button>
          <button type="button" class="move-btn" data-dir="right" aria-label="เดินขวา">▶</button>
        </div>
      </section>
    </main>

    <div id="levelModal" class="modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="levelName">
        <h2 id="levelName"></h2>
        <p id="levelDescription"></p>
        <p id="levelLock" class="lock-state"></p>
        <div class="modal-actions">
          <button id="startLevelBtn" type="button" class="primary">เริ่มด่าน</button>
          <button id="closeModalBtn" type="button" class="secondary">ปิด</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
