<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameForStudent - Cloud Sync</title>
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-512.svg" />
    <link rel="stylesheet" href="./src/css/styles.css" />
  </head>
  <body class="page-login">
    <main class="container">
      <section class="card card-login" aria-label="ฟอร์มผู้เล่น">
        <p class="badge">PWA + Firebase Cloud Sync</p>
        <h1 class="game-title">ข้อมูลผู้เล่น</h1>
        <p class="subtitle">กรอกข้อมูลแล้วกดบันทึก เพื่อ sync ขึ้น Firestore</p>

        <form id="loginForm" class="form" autocomplete="on">
          <label for="playerName">playerName</label>
          <input
            id="playerName"
            name="playerName"
            type="text"
            minlength="2"
            maxlength="24"
            placeholder="เช่น LittleHero"
            required
          />

          <label for="playerCode">playerCode</label>
          <input
            id="playerCode"
            name="playerCode"
            type="text"
            minlength="4"
            maxlength="24"
            placeholder="เช่น KID-1234"
            required
          />

          <button id="submitBtn" type="submit">บันทึกข้อมูล</button>
        </form>

        <button id="installBtn" type="button" class="btn-secondary" hidden>ติดตั้งแอป (Install)</button>
        <p id="statusMessage" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
