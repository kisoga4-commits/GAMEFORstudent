<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForKid</title>
    <meta name="theme-color" content="#7c3aed" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-512.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card" aria-label="ฟอร์มข้อมูลผู้เล่น">
        <h1>ForKid</h1>

        <form id="profileForm" novalidate>
          <label for="playerName" aria-label="ชื่อผู้เล่น">👤</label>
          <input id="playerName" name="playerName" type="text" minlength="2" maxlength="30" placeholder="ชื่อ" required />

          <label for="playerCode" aria-label="รหัสผู้เล่น">🔐</label>
          <input id="playerCode" name="playerCode" type="text" minlength="2" maxlength="30" placeholder="รหัส" required />

          <button type="submit" id="saveBtn">💾 บันทึก</button>
        </form>

        <button type="button" id="installBtn" class="secondary" hidden>📲 ติดตั้ง</button>
        <p id="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
